<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/logoicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generador de exámenes con IA. Convierte tus apuntes en test automáticamente.">
    <title>PonteAprobados</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
      body { margin: 0; background-color: #020617; font-family: 'Inter', system-ui, sans-serif; }
      /* Corrección para FontAwesome: fuerza a que no bloquee texto invisible */
      @font-face {
        font-family: 'Font Awesome 6 Free';
        font-style: normal;
        font-weight: 900;
        font-display: swap; 
        src: url(https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2) format('woff2');
      }
      .app-loader {
        height: 100vh; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; color: #cbd5e1;
      }
      .loader-spinner {
        width: 48px; height: 48px; border: 5px solid #4f46e5; /* Indigo-600 */
        border-bottom-color: transparent; border-radius: 50%; 
        display: inline-block; box-sizing: border-box; 
        animation: rotation 1s linear infinite; margin-bottom: 16px;
      }
      @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <link 
      rel="preload" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
  </head>

  <body>
    <div id="app">
      <div class="app-loader">
        <div class="loader-spinner"></div>
        <p style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.025em;">Cargando PonteAprobados...</p>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>

    <script>
      function cargarScriptsExternos() {
        if (window.scriptsCargados) return;
        window.scriptsCargados = true;
        console.log("⚡ Cargando servicios extra...");

        const adScript = document.createElement('script');
        adScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8114132400914870";
        adScript.async = true;
        adScript.crossOrigin = "anonymous";
        document.body.appendChild(adScript);

        const recapScript = document.createElement('script');
        recapScript.src = "https://www.google.com/recaptcha/api.js?render=%VITE_RECAPTCHA_SITE_KEY%"; 
        recapScript.async = true;
        document.body.appendChild(recapScript);
      }

      const eventosUsuario = ['mousemove', 'keydown', 'touchstart', 'scroll'];
      const iniciarCarga = () => {
        eventosUsuario.forEach(e => window.removeEventListener(e, iniciarCarga));
        cargarScriptsExternos();
      };
      eventosUsuario.forEach(e => window.addEventListener(e, iniciarCarga, { passive: true }));
      setTimeout(cargarScriptsExternos, 7000);
    </script>
  </body>
</html>
